openapi: 3.0.3
info:
  title: PETTZI Routines API
  version: "2.0.0"
security:
  - bearerAuth: []
paths:
  /pets/{petId}/routine:
    get:
      summary: Get the routine container and activities for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: Routine detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineDetailResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    put:
      summary: Create or update the routine container for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRoutineRequest'
      responses:
        '200':
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetRoutine'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/activities:
    post:
      summary: Create an activity inside the pet routine
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoutineActivityRequest'
      responses:
        '201':
          description: Created activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineActivity'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/activities/{activityId}:
    patch:
      summary: Update a routine activity
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoutineActivityRequest'
      responses:
        '200':
          description: Updated activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineActivity'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      summary: Delete a routine activity and its materialized occurrences
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/today:
    get:
      summary: List routine occurrences for today ordered by time
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: Today routine
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineOccurrenceExpanded'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/history:
    get:
      summary: List recent completed, skipped and missed occurrences
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: Routine history
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineOccurrenceExpanded'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/occurrences/{occurrenceId}/complete:
    post:
      summary: Mark an occurrence as completed
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/OccurrenceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceActionRequest'
      responses:
        '200':
          description: Updated occurrence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineOccurrence'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routine/occurrences/{occurrenceId}/skip:
    post:
      summary: Mark an occurrence as skipped
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/OccurrenceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceActionRequest'
      responses:
        '200':
          description: Updated occurrence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineOccurrence'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
components:
  parameters:
    PetId:
      in: path
      name: petId
      required: true
      schema: { type: string }
    ActivityId:
      in: path
      name: activityId
      required: true
      schema: { type: string }
    OccurrenceId:
      in: path
      name: occurrenceId
      required: true
      schema: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PetRoutine:
      type: object
      required: [routineId, petId, ownerUserId, timezone, status, createdAt, updatedAt]
      properties:
        routineId: { type: string }
        petId: { type: string }
        ownerUserId: { type: string }
        timezone: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RoutineActivity:
      type: object
      required: [activityId, routineId, petId, ownerUserId, title, type, status, schedule, createdAt, updatedAt]
      properties:
        activityId: { type: string }
        routineId: { type: string }
        petId: { type: string }
        ownerUserId: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
        schedule:
          oneOf:
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RoutineOccurrence:
      type: object
      required: [occurrenceId, routineId, activityId, petId, scheduledFor, status, createdAt, updatedAt]
      properties:
        occurrenceId: { type: string }
        routineId: { type: string }
        activityId: { type: string }
        petId: { type: string }
        scheduledFor: { type: string, format: date-time }
        status:
          type: string
          enum: [PENDING, COMPLETED, SKIPPED, MISSED]
        completedAt: { type: string, format: date-time }
        skippedAt: { type: string, format: date-time }
        notes: { type: string }
        completedByUserId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RoutineOccurrenceExpanded:
      allOf:
        - $ref: '#/components/schemas/RoutineOccurrence'
        - type: object
          required: [activity]
          properties:
            activity:
              $ref: '#/components/schemas/RoutineActivity'
    RoutineDetailResponse:
      type: object
      required: [activities]
      properties:
        routine:
          allOf:
            - $ref: '#/components/schemas/PetRoutine'
          nullable: true
        activities:
          type: array
          items:
            $ref: '#/components/schemas/RoutineActivity'
    UpsertRoutineRequest:
      type: object
      required: [timezone]
      properties:
        timezone: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
    CreateRoutineActivityRequest:
      type: object
      required: [title, type, schedule]
      properties:
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED]
        routineTimezone: { type: string }
        schedule:
          oneOf:
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
    UpdateRoutineActivityRequest:
      type: object
      properties:
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
        schedule:
          oneOf:
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
    DailySchedule:
      type: object
      required: [frequency, times]
      properties:
        frequency:
          type: string
          enum: [DAILY]
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    WeeklySchedule:
      type: object
      required: [frequency, daysOfWeek, times]
      properties:
        frequency:
          type: string
          enum: [WEEKLY]
        daysOfWeek:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 0
            maximum: 6
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    MonthlySchedule:
      type: object
      required: [frequency, daysOfMonth, times]
      properties:
        frequency:
          type: string
          enum: [MONTHLY]
        daysOfMonth:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
            maximum: 31
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    OccurrenceActionRequest:
      type: object
      properties:
        notes: { type: string }
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
