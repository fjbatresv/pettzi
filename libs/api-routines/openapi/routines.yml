openapi: 3.0.3
info:
  title: PETTZI Routines API
  version: "1.0.0"
security:
  - bearerAuth: []
paths:
  /pets/{petId}/routines:
    post:
      summary: Create routine for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoutineRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineDefinition'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      summary: List visible routines for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Routines
          content:
            application/json:
              schema:
                type: object
                required: [routines]
                properties:
                  routines:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineDefinition'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/{routineId}:
    get:
      summary: Get a routine
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/RoutineId'
      responses:
        '200':
          description: Routine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineDefinition'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    patch:
      summary: Update a routine
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/RoutineId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoutineRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineDefinition'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      summary: Delete a routine and its occurrences
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/RoutineId'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/upcoming:
    get:
      summary: List upcoming routine occurrences for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: Upcoming occurrences
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineOccurrenceExpanded'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/history:
    get:
      summary: List recent routine history for a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
      responses:
        '200':
          description: History occurrences
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineOccurrenceExpanded'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/{routineId}/occurrences:
    get:
      summary: List recent occurrences for a routine
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/RoutineId'
      responses:
        '200':
          description: Routine occurrences
          content:
            application/json:
              schema:
                type: object
                required: [occurrences]
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoutineOccurrence'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/occurrences/{occurrenceId}/complete:
    post:
      summary: Mark occurrence as completed
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/OccurrenceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceActionRequest'
      responses:
        '200':
          description: Updated occurrence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineOccurrence'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/routines/occurrences/{occurrenceId}/skip:
    post:
      summary: Mark occurrence as skipped
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PetId'
        - $ref: '#/components/parameters/OccurrenceId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OccurrenceActionRequest'
      responses:
        '200':
          description: Updated occurrence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineOccurrence'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
components:
  parameters:
    PetId:
      in: path
      name: petId
      required: true
      schema: { type: string }
    RoutineId:
      in: path
      name: routineId
      required: true
      schema: { type: string }
    OccurrenceId:
      in: path
      name: occurrenceId
      required: true
      schema: { type: string }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RoutineDefinition:
      type: object
      required: [routineId, petId, ownerUserId, title, type, status, timezone, schedule, createdAt, updatedAt]
      properties:
        routineId: { type: string }
        petId: { type: string }
        ownerUserId: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
        timezone: { type: string }
        schedule:
          oneOf:
            - $ref: '#/components/schemas/HourlyIntervalSchedule'
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RoutineOccurrence:
      type: object
      required: [occurrenceId, routineId, petId, scheduledFor, status, createdAt, updatedAt]
      properties:
        occurrenceId: { type: string }
        routineId: { type: string }
        petId: { type: string }
        scheduledFor: { type: string, format: date-time }
        status:
          type: string
          enum: [PENDING, COMPLETED, SKIPPED, MISSED]
        completedAt: { type: string, format: date-time }
        skippedAt: { type: string, format: date-time }
        notes: { type: string }
        completedByUserId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RoutineOccurrenceExpanded:
      allOf:
        - $ref: '#/components/schemas/RoutineOccurrence'
        - type: object
          properties:
            routine:
              $ref: '#/components/schemas/RoutineDefinition'
    CreateRoutineRequest:
      type: object
      required: [title, type, timezone, schedule]
      properties:
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        timezone: { type: string }
        schedule:
          oneOf:
            - $ref: '#/components/schemas/HourlyIntervalSchedule'
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
    UpdateRoutineRequest:
      type: object
      properties:
        title: { type: string }
        type:
          type: string
          enum: [FEEDING, WALKING, MEDICATION, HYGIENE, TRAINING, CUSTOM]
        notes: { type: string }
        timezone: { type: string }
        status:
          type: string
          enum: [ACTIVE, PAUSED, ARCHIVED]
        schedule:
          oneOf:
            - $ref: '#/components/schemas/HourlyIntervalSchedule'
            - $ref: '#/components/schemas/DailySchedule'
            - $ref: '#/components/schemas/WeeklySchedule'
            - $ref: '#/components/schemas/MonthlySchedule'
    HourlyIntervalSchedule:
      type: object
      required: [frequency, intervalHours, anchorTime]
      properties:
        frequency:
          type: string
          enum: [HOURLY_INTERVAL]
        intervalHours:
          type: integer
          minimum: 1
        anchorTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
    DailySchedule:
      type: object
      required: [frequency, times]
      properties:
        frequency:
          type: string
          enum: [DAILY]
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    WeeklySchedule:
      type: object
      required: [frequency, daysOfWeek, times]
      properties:
        frequency:
          type: string
          enum: [WEEKLY]
        daysOfWeek:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 0
            maximum: 6
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    MonthlySchedule:
      type: object
      required: [frequency, daysOfMonth, times]
      properties:
        frequency:
          type: string
          enum: [MONTHLY]
        daysOfMonth:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
            maximum: 31
        times:
          type: array
          minItems: 1
          items:
            type: string
            pattern: '^\d{2}:\d{2}$'
    OccurrenceActionRequest:
      type: object
      properties:
        notes: { type: string }
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
