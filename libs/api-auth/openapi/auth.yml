openapi: 3.0.3
info:
  title: PETTZI Auth API
  version: '1.0.0'
  description: Authentication endpoints for PETTZI (Cognito-backed).
paths:
  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User registered (confirmation pending) and session tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'
  /login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Tokens returned or a NEW_PASSWORD_REQUIRED challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthTokensResponse'
                  - $ref: '#/components/schemas/NewPasswordChallengeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /forgot-password:
    post:
      summary: Start password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Temporary password sent via SES template
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /complete-new-password:
    post:
      summary: Complete `NEW_PASSWORD_REQUIRED` challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteNewPasswordRequest'
      responses:
        '200':
          description: Tokens issued after new password is accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /confirm-email:
    post:
      summary: Confirm welcome email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /me:
    get:
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    patch:
      summary: Update user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
    delete:
      summary: Delete user account and associated pets
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
components:
  schemas:
    AuthRegisterRequest:
      type: object
      required: [name, email, password, locale]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        locale:
          type: string
          enum: [es, en]
    UserProfile:
      type: object
      required: [ownerId, userId, fullName, createdAt]
      properties:
        ownerId: { type: string }
        userId: { type: string }
        fullName: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        profilePhotoKey: { type: string }
        locale:
          type: string
          enum: [es, en]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    UpdateUserProfileRequest:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        profilePhotoKey: { type: string }
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        locale:
          type: string
          enum: [es, en]
    AuthTokensResponse:
      type: object
      required: [idToken, accessToken]
      properties:
        idToken:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
    RegisterResponse:
      type: object
      required: [message, idToken, accessToken]
      properties:
        message:
          type: string
        idToken:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: number
    NewPasswordChallengeResponse:
      type: object
      required: [challenge, session, message]
      properties:
        challenge:
          type: string
        session:
          type: string
        message:
          type: string
    CompleteNewPasswordRequest:
      type: object
      required: [email, session, newPassword]
      properties:
        email:
          type: string
          format: email
        session:
          type: string
        newPassword:
          type: string
          minLength: 8
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
              description: Optional details about the error
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
