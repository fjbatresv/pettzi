openapi: 3.0.3
info:
  title: PETTZI Owners API
  version: "1.0.0"
security:
  - bearerAuth: []
paths:
  /me:
    get:
      summary: Get current owner profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Owner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/owners:
    get:
      summary: List owners of a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Owners
          content:
            application/json:
              schema:
                type: object
                properties:
                  owners:
                    type: array
                    items:
                      $ref: '#/components/schemas/PetOwner'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      summary: Add co-owner (primary only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPetOwnerRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetOwner'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/owners/invite:
    post:
      summary: Invite co-owner by email (primary only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        '200':
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pet-invites/preview:
    get:
      summary: Preview a pet invite (public)
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetInvitePreview'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pet-invites/accept:
    post:
      summary: Accept a pet invite (authenticated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PetInvitePreview'
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [accepted, already-linked]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pet-invites/pending:
    get:
      summary: List pending pet invites (authenticated)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pending invites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetInvitePendingList'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pet-invites/reject:
    post:
      summary: Reject a pet invite (authenticated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Invite rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/owners/{ownerId}:
    delete:
      summary: Remove co-owner (primary only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
        - in: path
          name: ownerId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Owner:
      type: object
      required: [ownerId, userId, fullName, createdAt]
      properties:
        ownerId: { type: string }
        userId: { type: string }
        fullName: { type: string }
        phone: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PetOwner:
      type: object
      required: [petId, ownerId, role, linkedAt]
      properties:
        petId: { type: string }
        ownerId: { type: string }
        role:
          type: string
          enum: [PRIMARY, SECONDARY]
        linkedAt: { type: string, format: date-time }
        profile:
          $ref: '#/components/schemas/OwnerProfileSummary'
    OwnerProfileSummary:
      type: object
      properties:
        fullName: { type: string }
        email: { type: string }
        profilePhotoKey: { type: string }
        locale:
          type: string
          enum: [es, en]
    PetInvitePreview:
      type: object
      required: [pet, inviter, expiresAt]
      properties:
        pet:
          $ref: '#/components/schemas/PetInvitePet'
        inviter:
          $ref: '#/components/schemas/PetInviteInviter'
        expiresAt:
          type: string
          format: date-time
    PetInvitePending:
      allOf:
        - $ref: '#/components/schemas/PetInvitePreview'
        - type: object
          required: [token]
          properties:
            token: { type: string }
    PetInvitePendingList:
      type: object
      properties:
        invites:
          type: array
          items:
            $ref: '#/components/schemas/PetInvitePending'
    PetInvitePet:
      type: object
      required: [petId, name, breed, species, age, imageUrl]
      properties:
        petId: { type: string }
        name: { type: string }
        breed: { type: string }
        species: { type: string }
        age: { type: string }
        imageUrl: { type: string }
    PetInviteInviter:
      type: object
      required: [ownerId, fullName, imageUrl]
      properties:
        ownerId: { type: string }
        fullName: { type: string }
        imageUrl: { type: string }
    AddPetOwnerRequest:
      type: object
      required: [ownerId]
      properties:
        ownerId: { type: string }
        role:
          type: string
          enum: [PRIMARY, SECONDARY]
          description: Defaults to SECONDARY
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Internal error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
