openapi: 3.0.3
info:
  title: PETO Owners API
  version: "1.0.0"
security:
  - bearerAuth: []
paths:
  /me:
    get:
      summary: Get current owner profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Owner profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Owner'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/owners:
    get:
      summary: List owners of a pet
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Owners
          content:
            application/json:
              schema:
                type: object
                properties:
                  owners:
                    type: array
                    items:
                      $ref: '#/components/schemas/PetOwner'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      summary: Add co-owner (primary only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPetOwnerRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetOwner'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
  /pets/{petId}/owners/{ownerId}:
    delete:
      summary: Remove co-owner (primary only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: petId
          required: true
          schema: { type: string }
        - in: path
          name: ownerId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Owner:
      type: object
      required: [ownerId, userId, fullName, createdAt]
      properties:
        ownerId: { type: string }
        userId: { type: string }
        fullName: { type: string }
        phone: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PetOwner:
      type: object
      required: [petId, ownerId, role, linkedAt]
      properties:
        petId: { type: string }
        ownerId: { type: string }
        role:
          type: string
          enum: [PRIMARY, SECONDARY]
        linkedAt: { type: string, format: date-time }
    AddPetOwnerRequest:
      type: object
      required: [ownerId]
      properties:
        ownerId: { type: string }
        role:
          type: string
          enum: [PRIMARY, SECONDARY]
          description: Defaults to SECONDARY
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Internal error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
