openapi: 3.0.3
info:
  title: PETTZI Pets API
  version: "1.0.0"
  description: CRUD operations for pets.
security:
  - bearerAuth: []
paths:
  /:
    post:
      summary: Create pet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
      responses:
        '201':
          description: Pet created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      summary: List pets for current owner
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pets
          content:
            application/json:
              schema:
                type: object
                properties:
                  pets:
                    type: array
                    items:
                      $ref: '#/components/schemas/PetSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
  /{petId}:
    get:
      summary: Get pet by id
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      summary: Update pet metadata
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePetRequest'
      responses:
        '200':
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Archive pet
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pet archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  pet:
                    $ref: '#/components/schemas/Pet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /{petId}/shared-records:
    post:
      summary: Create shared record link
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSharedRecordRequest'
      responses:
        '201':
          description: Shared record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedRecordSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      summary: List shared records for pet
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of shared records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/SharedRecordSummary'
                  nextCursor:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /{petId}/shared-records/{token}:
    delete:
      summary: Delete shared record
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared record deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /shared-records/{token}:
    get:
      summary: Get shared record (public)
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Shared record detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  petId:
                    type: string
                  items:
                    type: array
                    items:
                      type: string
                  expiresAt:
                    type: string
                  createdAt:
                    type: string
                  pet:
                    $ref: '#/components/schemas/Pet'
                  photoUrl:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                  nextCursor:
                    type: string
                  requiresPassword:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pet:
      type: object
      required: [petId, name, species, createdAt]
      properties:
        petId:
          type: string
        ownerId:
          type: string
        name:
          type: string
        species:
          type: string
          enum: [DOG, CAT, BIRD, REPTILE, SNAKE, FROG, TURTLE, OTHER]
        breed:
          type: string
        photoKey:
          type: string
        photoThumbnailKey:
          type: string
        birthDate:
          type: string
          format: date-time
        notes:
          type: string
        color:
          type: string
        weightKg:
          type: number
        photoKey:
          type: string
        photoThumbnailKey:
          type: string
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PetSummary:
      type: object
      required: [petId, name, species]
      properties:
        petId:
          type: string
        name:
          type: string
        species:
          type: string
          enum: [DOG, CAT, BIRD, REPTILE, SNAKE, FROG, TURTLE, OTHER]
        breed:
          type: string
    SharedRecordSummary:
      type: object
      required: [token, petId, items, expiresAt, createdAt]
      properties:
        token:
          type: string
        petId:
          type: string
        ownerId:
          type: string
        items:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateSharedRecordRequest:
      type: object
      required: [items, expiresIn]
      properties:
        items:
          type: array
          items:
            type: string
        expiresIn:
          type: string
          enum: ['24h', '3d', '1w', '1m']
        password:
          type: string
    CreatePetRequest:
      type: object
      required: [name, species]
      properties:
        name:
          type: string
        species:
          type: string
          enum: [DOG, CAT, BIRD, REPTILE, SNAKE, FROG, TURTLE, OTHER]
        breed:
          type: string
        birthDate:
          type: string
          format: date
        notes:
          type: string
        color:
          type: string
        weightKg:
          type: number
        photoKey:
          type: string
        photoThumbnailKey:
          type: string
        lastGroomingDate:
          type: string
          format: date-time
        lastVetVisitDate:
          type: string
          format: date-time
        healthIndex:
          type: number
    UpdatePetRequest:
      type: object
      properties:
        name:
          type: string
        species:
          type: string
        breed:
          type: string
        birthDate:
          type: string
          format: date
        notes:
          type: string
        color:
          type: string
        weightKg:
          type: number
        photoKey:
          type: string
        photoThumbnailKey:
          type: string
        lastGroomingDate:
          type: string
          format: date-time
        lastVetVisitDate:
          type: string
          format: date-time
        healthIndex:
          type: number
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
