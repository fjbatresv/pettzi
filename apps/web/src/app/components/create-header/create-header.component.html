<header class="create-topbar">
  <div class="brand">
    <img src="/logo.svg" [attr.alt]="'createPet.logoAlt' | translate" />
    <span>{{ 'createPet.logoText' | translate }}</span>
  </div>
  <div class="top-actions">
    <app-language-toggle></app-language-toggle>
    <div class="avatar">
      <img *ngIf="avatarUrl" [src]="avatarUrl" [alt]="avatarLabel" />
      <span *ngIf="!avatarUrl">{{ avatarLabel }}</span>
    </div>
  </div>
</header>
