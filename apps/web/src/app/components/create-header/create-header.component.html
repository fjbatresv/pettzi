<header class="create-topbar">
  <div class="brand">
    <img src="/logo.svg" [attr.alt]="'createPet.logoAlt' | translate" />
    <span>{{ 'createPet.logoText' | translate }}</span>
  </div>
  <div class="top-actions">
    <div class="lang-toggle" role="group" [attr.aria-label]="'login.langToggle' | translate">
      <button
        type="button"
        class="lang-btn"
        [class.active]="locale === 'es'"
        [attr.aria-pressed]="locale === 'es'"
        (click)="setLocale('es')"
      >
        {{ 'login.langEs' | translate }}
      </button>
      <button
        type="button"
        class="lang-btn"
        [class.active]="locale === 'en'"
        [attr.aria-pressed]="locale === 'en'"
        (click)="setLocale('en')"
      >
        {{ 'login.langEn' | translate }}
      </button>
    </div>
    <div class="avatar">{{ avatarLabel }}</div>
  </div>
</header>
