<mat-sidenav-container class="dashboard-shell">
  <mat-sidenav #sidenav class="dashboard-sidenav" [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile">
    <div class="sidenav-top">
      <div class="brand">
        <div class="brand-mark">
          <img src="/logo.svg" alt="Pettzi" />
        </div>
        <div>
          <h2>Pettzi</h2>
        </div>
      </div>

      <nav class="nav">
        <a
          class="nav-link"
          routerLink="/home"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <mat-icon class="nav-icon" aria-hidden="true">home</mat-icon>
          {{ 'dashboard.navDashboard' | translate }}
        </a>
        <a class="nav-link" routerLink="/settings" routerLinkActive="active">
          <mat-icon class="nav-icon" aria-hidden="true">settings</mat-icon>
          {{ 'dashboard.navSettings' | translate }}
        </a>
      </nav>
    </div>

    <div class="active-pet">
      <button mat-raised-button color="primary" class="primary-cta" routerLink="/pets/new">
        {{ 'dashboard.addNewPet' | translate }}
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content">
    <header class="dashboard-header">
      <div class="header-title">
        @if (isMobile) {
          <button
            class="icon-btn menu-toggle"
            type="button"
            [attr.aria-label]="'dashboard.menu' | translate"
            (click)="sidenav.toggle()"
          >
            <mat-icon>menu</mat-icon>
          </button>
          <img
            class="header-logo"
            src="/logo.svg"
            alt="Pettzi"
          />
        }
      </div>
      <div class="header-actions">
        <app-language-toggle></app-language-toggle>
        <button
          type="button"
          class="avatar-button"
          [matMenuTriggerFor]="userMenu"
          [attr.aria-label]="'menu.userMenu' | translate"
        >
          <div class="avatar">
            @if (userPhotoUrl) {
              <img
                [src]="userPhotoUrl"
                [alt]="userInitials"
              />
            } @else {
              <span>{{ userInitials }}</span>
            }
          </div>
          @if (pendingInvitesCount > 0) {
            <span class="avatar-badge">{{ pendingInvitesCount }}</span>
          }
        </button>
        <mat-menu #userMenu="matMenu" class="user-menu">
          <button mat-menu-item routerLink="/invites">
            <mat-icon>mail</mat-icon>
            <span>{{ 'menu.invites' | translate }}</span>
            @if (pendingInvitesCount > 0) {
              <span class="menu-badge">{{ pendingInvitesCount }}</span>
            }
          </button>
          <button mat-menu-item routerLink="/settings">
            <mat-icon>settings</mat-icon>
            <span>{{ 'menu.settings' | translate }}</span>
          </button>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>{{ 'menu.logout' | translate }}</span>
          </button>
        </mat-menu>
      </div>
    </header>

    <main class="dashboard-main">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
