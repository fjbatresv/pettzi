name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage (e.g., dev, staging, prod)"
        required: true
        default: "dev"

permissions:
  contents: write
  id-token: write

env:
  STAGE: ${{ inputs.stage || 'dev' }}
  AWS_REGION: us-east-1
  API_PREFIX: api
  API_HOSTED_ZONE_NAME: pettzi.net
  API_HOSTED_ZONE_ID: ${{ secrets.API_HOSTED_ZONE_ID }}
  APP_PREFIX: app
  DSN_PREFIX: img
  SES_FROM_EMAIL: no-reply@pettzi.net
  KMS_ENABLED: false
  MINIMAL_COST_MODE: ${{ (inputs.stage || 'dev') != 'prod' }}
  ENABLE_INFRA_ALARMS: false
  ENABLE_DETAILED_ALARMS: false
  ENABLE_MONITORING_ALARMS: true
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_RELEASE: frontend-${{ inputs.stage }}-${{ github.run_number }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

jobs:
  deploy_cdk:
    name: Deploy CDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Install lambda layers dependencies
        run: npm run install:layers

      - name: Deploy CDK stacks (safe layers migration)
        shell: bash
        run: |
          set -euo pipefail

          stage_slug=$(echo "${STAGE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g')

          cognito_layer_name="pettzi-cognito-deps-${stage_slug}"
          s3_layer_name="pettzi-s3-deps-${stage_slug}"
          ses_layer_name="pettzi-ses-deps-${stage_slug}"
          ddb_layer_name="pettzi-ddb-deps-${stage_slug}"

          cognito_param="/pettzi/${stage_slug}/layers/cognito/arn"
          s3_param="/pettzi/${stage_slug}/layers/s3/arn"
          ses_param="/pettzi/${stage_slug}/layers/ses/arn"
          ddb_param="/pettzi/${stage_slug}/layers/ddb/arn"

          latest_layer_arn() {
            local layer_name="$1"
            aws lambda list-layer-versions \
              --layer-name "${layer_name}" \
              --query 'LayerVersions[0].LayerVersionArn' \
              --output text 2>/dev/null || true
          }

          layer_arn_from_stack() {
            local logical_id_fragment="$1"
            aws cloudformation list-stack-resources \
              --stack-name "PettziLayersStack" \
              --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::LayerVersion' && contains(LogicalResourceId, '${logical_id_fragment}')].PhysicalResourceId | [0]" \
              --output text 2>/dev/null || true
          }

          seed_param_if_available() {
            local param_name="$1"
            local layer_name="$2"
            local logical_id_fragment="$3"
            local arn
            arn="$(latest_layer_arn "${layer_name}")"
            if [ -z "${arn}" ] || [ "${arn}" = "None" ]; then
              arn="$(layer_arn_from_stack "${logical_id_fragment}")"
            fi
            if [ -n "${arn}" ] && [ "${arn}" != "None" ]; then
              aws ssm put-parameter \
                --name "${param_name}" \
                --type String \
                --value "${arn}" \
                --overwrite >/dev/null
              echo "Seeded ${param_name} with ${arn}"
            else
              echo "Layer ${layer_name} not found in Lambda/CloudFormation; skipping seed for ${param_name}"
            fi
          }

          seed_param_if_available "${cognito_param}" "${cognito_layer_name}" "CognitoDepsLayer"
          seed_param_if_available "${s3_param}" "${s3_layer_name}" "S3DepsLayer"
          seed_param_if_available "${ses_param}" "${ses_layer_name}" "SesDepsLayer"
          seed_param_if_available "${ddb_param}" "${ddb_layer_name}" "DdbDepsLayer"

          phase1=(
            PettziAuthApiStack
            PettziPetsApiStack
            PettziEventsApiStack
            PettziRemindersApiStack
            PettziUploadsApiStack
            PettziOwnersApiStack
            PettziCatalogsApiStack
          )
          echo "Phase 1 deploy (consumers): ${phase1[*]}"
          npx nx run cdk:deploy -- "${phase1[@]}"

          echo "Removing layer SSM params before deploying layers stack (to allow CFN ownership)..."
          aws ssm delete-parameter --name "${cognito_param}" >/dev/null 2>&1 || true
          aws ssm delete-parameter --name "${s3_param}" >/dev/null 2>&1 || true
          aws ssm delete-parameter --name "${ses_param}" >/dev/null 2>&1 || true
          aws ssm delete-parameter --name "${ddb_param}" >/dev/null 2>&1 || true

          echo "Phase 2 deploy (layers): PettziLayersStack"
          npx nx run cdk:deploy -- PettziLayersStack

          echo "Phase 3 deploy (full reconciliation): --all"
          npx nx run cdk:deploy -- --all

      - name: Invalidate API CloudFront
        run: |
          api_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziApiDomainStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$api_distribution_id" ] && [ "$api_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$api_distribution_id" \
              --paths "/*"
          else
            echo "No API CloudFront distribution found for PettziApiDomainStack."
          fi

  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy_cdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Install sentry cli
        run: npm i @sentry/cli

      - name: Set stage for buckets
        run: |
          echo "STAGE_SLUG=${STAGE}" >> "$GITHUB_ENV"

      - name: Show frontend bucket name
        run: |
          echo "Frontend bucket: pettzi-frontend-${STAGE_SLUG}"

      - name: Configure Sentry release/DSN for frontend
        if: ${{ env.SENTRY_DSN != '' }}
        run: |
          cat > apps/web/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiBaseUrl: 'https://api.pettzi.net',
            cognitoDomain: 'https://us-east-1xx_hce2yn2.auth.us-east-1.amazoncognito.com',
            cognitoClientId: '1hhkaipbk6vt8i1nagm643br5l',
            cognitoRedirectUri: 'https://app.pettzi.net',
            sentryDsn: '${SENTRY_DSN}',
            sentryRelease: '${SENTRY_RELEASE}',
            sentryTracesSampleRate: 0.1,
            sentryProfilesSampleRate: 0.05,
          };
          EOF

      - name: Build frontend
        run: npx nx build web --configuration production --source-map

      - name: Create Sentry release and upload sourcemaps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT != '' }}
        run: |
          release="${SENTRY_RELEASE:-beta}"
          echo "Using Sentry release: ${release}"
          npx @sentry/cli releases new "${release}"
          npx @sentry/cli sourcemaps inject "dist/web/browser"
          npx @sentry/cli sourcemaps upload "dist/web/browser" \
            --release "${release}" \
            --url-prefix "~/" \
            --validate \
            --rewrite
          npx @sentry/cli releases finalize "${release}"

      - name: Sync frontend to S3
        run: |
          frontend_bucket="pettzi-frontend-${STAGE_SLUG}"
          if ! aws s3api head-bucket --bucket "$frontend_bucket" > /dev/null 2>&1; then
            echo "Frontend bucket ${frontend_bucket} does not exist. Skipping upload."
            exit 0
          fi
          aws s3 sync "dist/web/browser" "s3://${frontend_bucket}" --delete

      - name: Invalidate Frontend CloudFront
        run: |
          frontend_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziFrontendStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$frontend_distribution_id" ] && [ "$frontend_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$frontend_distribution_id" \
              --paths "/*"
          else
            echo "No Frontend CloudFront distribution found for PettziFrontendStack."
          fi

  seed_catalogs:
    name: Seed Catalogs
    runs-on: ubuntu-latest
    needs: deploy_cdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build catalogs dependencies
        run: npx nx build @pettzi/api-catalogs

      - name: Set stage slug and table name
        run: |
          STAGE_SLUG=$(echo "${STAGE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g')
          echo "STAGE_SLUG=${STAGE_SLUG}" >> "$GITHUB_ENV"
          echo "PETTZI_TABLE_NAME=pettzi-table-${STAGE_SLUG}" >> "$GITHUB_ENV"

      - name: Dry run catalogs seed
        env:
          AWS_PROFILE: ""
          AWS_DEFAULT_PROFILE: ""
          AWS_SDK_LOAD_CONFIG: "0"
        run: npx nx run @pettzi/api-catalogs:seed -- --dry-run

      - name: Run catalogs seed
        env:
          AWS_PROFILE: ""
          AWS_DEFAULT_PROFILE: ""
          AWS_SDK_LOAD_CONFIG: "0"
        run: npx nx run @pettzi/api-catalogs:seed

  deploy_email_images:
    name: Deploy Email Images
    runs-on: ubuntu-latest
    needs: deploy_cdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set stage for buckets
        run: |
          echo "STAGE_SLUG=${STAGE}" >> "$GITHUB_ENV"

      - name: Show email assets bucket name
        run: |
          echo "Email assets bucket: pettzi-email-assets-${STAGE_SLUG}"

      - name: Sync email images to S3
        run: |
          email_bucket="pettzi-email-assets-${STAGE_SLUG}"
          if ! aws s3api head-bucket --bucket "$email_bucket" > /dev/null 2>&1; then
            echo "Email assets bucket ${email_bucket} does not exist. Skipping upload."
            exit 0
          fi
          aws s3 sync "img" "s3://${email_bucket}" --delete

      - name: Invalidate Email Assets CloudFront
        run: |
          email_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziEmailAssetsCdnStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$email_distribution_id" ] && [ "$email_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$email_distribution_id" \
              --paths "/*"
          else
            echo "No Email Assets CloudFront distribution found for PettziEmailAssetsCdnStack."
          fi
