name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage (e.g., dev, staging, prod)"
        required: true
        default: "dev"

permissions:
  contents: read
  id-token: write

env:
  STAGE: ${{ inputs.stage }}
  AWS_REGION: us-east-1
  API_PREFIX: api
  API_HOSTED_ZONE_NAME: pettzi.net
  API_HOSTED_ZONE_ID: ${{ secrets.API_HOSTED_ZONE_ID }}
  APP_PREFIX: app
  DSN_PREFIX: img
  SES_FROM_EMAIL: no-reply@pettzi.net
  KMS_ENABLED: false

jobs:
  deploy_cdk:
    name: Deploy CDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Install lambda layers dependencies
        run: npm run install:layers

      - name: Deploy CDK stacks
        run: npx nx run cdk:deploy -- --all

      - name: Invalidate API CloudFront
        run: |
          api_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziApiDomainStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$api_distribution_id" ] && [ "$api_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$api_distribution_id" \
              --paths "/*"
          else
            echo "No API CloudFront distribution found for PettziApiDomainStack."
          fi

  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy_cdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npx nx build web

      - name: Sync frontend to S3
        run: |
          frontend_bucket=$(aws cloudformation list-stack-resources \
            --stack-name "PettziFrontendStack" \
            --query "StackResourceSummaries[?LogicalResourceId=='FrontendBucket'].PhysicalResourceId | [0]" \
            --output text)
          if [ -z "$frontend_bucket" ] || [ "$frontend_bucket" = "None" ]; then
            frontend_bucket="pettzi-frontend-${STAGE_SLUG}"
          fi
          aws s3 sync "dist/web/browser" "s3://${frontend_bucket}" --delete

      - name: Invalidate Frontend CloudFront
        run: |
          frontend_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziFrontendStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$frontend_distribution_id" ] && [ "$frontend_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$frontend_distribution_id" \
              --paths "/*"
          else
            echo "No Frontend CloudFront distribution found for PettziFrontendStack."
          fi

  deploy_email_images:
    name: Deploy Email Images
    runs-on: ubuntu-latest
    needs: deploy_cdk
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync email images to S3
        run: |
          email_bucket=$(aws cloudformation list-stack-resources \
            --stack-name "PettziEmailAssetsCdnStack" \
            --query "StackResourceSummaries[?LogicalResourceId=='EmailAssetsBucket'].PhysicalResourceId | [0]" \
            --output text)
          if [ -z "$email_bucket" ] || [ "$email_bucket" = "None" ]; then
            email_bucket="pettzi-email-assets-${STAGE_SLUG}"
          fi
          aws s3 sync "img" "s3://${email_bucket}" --delete

      - name: Invalidate Email Assets CloudFront
        run: |
          email_distribution_id=$(aws cloudformation list-stack-resources \
            --stack-name "PettziEmailAssetsCdnStack" \
            --query "StackResourceSummaries[?ResourceType=='AWS::CloudFront::Distribution'].PhysicalResourceId | [0]" \
            --output text)
          if [ -n "$email_distribution_id" ] && [ "$email_distribution_id" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$email_distribution_id" \
              --paths "/*"
          else
            echo "No Email Assets CloudFront distribution found for PettziEmailAssetsCdnStack."
          fi
